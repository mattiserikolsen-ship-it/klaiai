<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KlarAI — Log ind</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container { width: 100%; max-width: 420px; }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo-text { font-size: 2rem; font-weight: 900; color: #0a2463; letter-spacing: -1px; }
    .logo-text span { color: #0a5c8a; }
    .logo-sub { font-size: .8rem; color: #888; margin-top: .25rem; }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 36px;
      box-shadow: 0 2px 20px rgba(0,0,0,.08);
    }
    .card-title { font-size: 1.1rem; font-weight: 700; color: #0a2463; margin-bottom: .25rem; }
    .card-sub { font-size: .82rem; color: #888; margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: .8rem; font-weight: 600; color: #444; margin-bottom: .4rem; }
    input {
      width: 100%; padding: .75rem 1rem;
      border: 1.5px solid #e2e8f0; border-radius: 10px;
      font-size: .9rem; font-family: inherit; color: #0a1628;
      transition: border-color .15s; outline: none;
    }
    input:focus { border-color: #0a5c8a; }
    .btn {
      width: 100%; padding: .85rem;
      background: #0a2463; color: #fff;
      border: none; border-radius: 10px;
      font-size: .95rem; font-weight: 700; font-family: inherit;
      cursor: pointer; margin-top: 8px; transition: opacity .15s;
    }
    .btn:hover { opacity: .88; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .error {
      background: #fee2e2; color: #dc2626;
      border-radius: 8px; padding: .65rem 1rem;
      font-size: .82rem; margin-top: 12px; display: none;
    }
    .footer-note { text-align: center; font-size: .75rem; color: #aaa; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-text">Klar<span>AI</span></div>
      <div class="logo-sub">AI-agenter til din virksomhed</div>
    </div>
    <div class="card">
      <div class="card-title">Log ind</div>
      <div class="card-sub">Indtast din email og adgangskode</div>
      <form onsubmit="login(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="din@email.dk" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label>Adgangskode</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password"/>
        </div>
        <button class="btn" type="submit" id="loginBtn">Log ind</button>
        <div class="error" id="errorMsg"></div>
      </form>
    </div>
    <div class="footer-note">KlarAI · Kun autoriserede brugere</div>
  </div>

<script>
  const AGENT_URL = 'https://klaiai.onrender.com';

  // Hvis allerede logget ind, redirect
  const token = sessionStorage.getItem('klaiai_token');
  const role = sessionStorage.getItem('klaiai_role');
  if (token && role === 'admin') window.location.href = '/app/admin.html';
  if (token && role === 'client') {
    const kid = sessionStorage.getItem('klaiai_klient_id');
    if (kid) window.location.href = '/portal/' + kid;
  }

  async function login(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');
    err.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Logger ind...';

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
      const res = await fetch(AGENT_URL + '/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok || data.error) {
        err.textContent = data.error || 'Forkert email eller adgangskode';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Log ind';
        return;
      }

      sessionStorage.setItem('klaiai_token', data.token);
      sessionStorage.setItem('klaiai_role', data.role);

      if (data.role === 'admin') {
        window.location.href = '/app/admin.html';
      } else {
        sessionStorage.setItem('klaiai_klient_id', data.klient_id);
        window.location.href = '/portal/' + data.klient_id;
      }
    } catch(ex) {
      err.textContent = 'Kunne ikke forbinde til serveren. Prøv igen.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Log ind';
    }
  }
</script>
</body>
</html>
