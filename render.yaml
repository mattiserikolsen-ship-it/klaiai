services:
  - type: web
    name: klaiai-agents
    runtime: python
    buildCommand: apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0 libffi-dev shared-mime-info fonts-liberation && pip install -r requirements.txt
    startCommand: gunicorn agents.app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: ECONOMIC_APP_SECRET
        sync: false
