services:
  - type: web
    name: klaiai-agents
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn agents.app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
